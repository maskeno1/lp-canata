<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ログイン - 株式会社かなた</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(155deg, #0B2D52 0%, #154E8A 50%, #1E6BB5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 52px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-logo svg { color: #2F8FE0; }
    .login-logo-text {
      font-size: 17px;
      font-weight: 700;
      color: #1A2B3C;
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #1A2B3C;
      margin-bottom: 8px;
    }
    .login-sub {
      font-size: 13px;
      color: #6B85A0;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #3D5A70;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #D0E5F5;
      border-radius: 4px;
      font-family: inherit;
      font-size: 15px;
      color: #1A2B3C;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    .form-input:focus {
      border-color: #2F8FE0;
      box-shadow: 0 0 0 3px rgba(47,143,224,.14);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #2F8FE0;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .25s, transform .2s;
      margin-top: 8px;
    }
    .btn-login:hover {
      background: #1A6DB5;
      transform: translateY(-1px);
    }
    .error-msg {
      background: #fef0f0;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #6B85A0;
      text-decoration: none;
    }
    .back-link:hover { color: #2F8FE0; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1.8"/>
        <path d="M7 16 Q12 9 16 16 Q20 23 25 16" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
      </svg>
      <span class="login-logo-text">株式会社かなた</span>
    </div>
    <h1 class="login-title">管理者ログイン</h1>
    <p class="login-sub">サイト管理画面にアクセスするにはパスワードを入力してください。</p>

    <div class="error-msg" id="errorMsg">パスワードが正しくありません。</div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input class="form-input" type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">ログイン</button>
    </form>
    <a class="back-link" href="/index.html">← サイトに戻る</a>
  </div>

  <script>
    // パスワードのSHA-256ハッシュ（サーバー不要・Netlify対応）
    // ※ パスワード変更時はこの値も更新が必要
    const ADMIN_HASH = '6571266025bb051b058893e23058f63a8061d05784363ee95d388a3d757d3487';

    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256',
        new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function saveSession(hash) {
      localStorage.setItem('admin_auth', hash);
      localStorage.setItem('admin_auth_ts', Date.now().toString());
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const pw  = document.getElementById('password').value;
      const err = document.getElementById('errorMsg');
      const btn = document.querySelector('.btn-login');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '確認中...';

      // ① 管理サーバー（/api/login）が使える場合はそちらを優先
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        if (res.ok) {
          saveSession(await sha256(pw));
          window.location.href = '/admin.html';
          return;
        }
        if (res.status === 401) {
          err.textContent = 'パスワードが正しくありません。';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'ログイン';
          return;
        }
        // それ以外（404等）は ② へ
      } catch (_) { /* サーバーなし → ② へ */ }

      // ② Netlify静的配信: HTML埋め込みハッシュで照合
      const hash = await sha256(pw);
      if (hash === ADMIN_HASH) {
        saveSession(hash);
        window.location.href = '/admin.html';
      } else {
        err.textContent = 'パスワードが正しくありません。';
        err.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'ログイン';
    });
  </script>
</body>
</html>
